<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Strix's site</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070a;
    --panel:#0f1114;
    --glass: rgba(255,255,255,0.03);
    --muted:#9aa3b2;
    --accent:#00e5ff;
    --accent-2:#7c4dff;
    --card-border: rgba(255,255,255,0.04);
    --radius:12px;
    --max-width:1100px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter,system-ui,Segoe UI,Arial;
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(124,77,255,0.06), transparent 8%),
      radial-gradient(900px 400px at 90% 90%, rgba(0,229,255,0.03), transparent 8%),
      var(--bg);
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    display:flex;
    min-height:100vh;
  }

  /* Sidebar */
  .sidebar {
    width:280px;
    min-width:220px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-right:1px solid var(--card-border);
    padding:28px 22px;
    position:fixed;
    left:0; top:0; bottom:0;
    display:flex;
    flex-direction:column;
    gap:18px;
    backdrop-filter: blur(6px) saturate(120%);
  }

  .brand {
    display:flex;
    gap:12px;
    align-items:center;
  }
  .logo {
    width:44px; height:44px;
    border-radius:10px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#041018; font-size:18px;
    box-shadow: 0 6px 18px rgba(124,77,255,0.08), 0 2px 6px rgba(0,229,255,0.04);
  }
  .brand h1{font-size:16px;margin:0;letter-spacing:0.2px}
  .brand p{margin:0;color:var(--muted);font-size:12px}

  .search {
    display:flex; gap:8px; align-items:center;
    background:var(--glass); padding:8px; border-radius:10px;
    border:1px solid var(--card-border);
  }
  .search input{
    background:transparent; border:0; outline:none; color:inherit; width:100%;
    font-size:14px;
  }
  .nav {
    display:flex; flex-direction:column; gap:6px; margin-top:6px;
  }
  .nav a{
    display:flex; gap:12px; align-items:center; padding:10px 12px; border-radius:8px;
    color:#cfe9f2; text-decoration:none; font-weight:600; font-size:14px;
    transition: all .18s ease;
  }
  .nav a .dot{
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(180deg,var(--accent),var(--accent-2));
    box-shadow:0 6px 14px rgba(0,229,255,0.06);
  }
  
  .nav .subelement{
  	margin-left:20px;
  	display: none;
  }
  
  .nav a:hover{ transform: translateX(6px); color:var(--accent) }
  .nav a.active{ background: linear-gradient(90deg, rgba(0,229,255,0.03), rgba(124,77,255,0.02)); color:var(--accent) }

  .spacer{flex:1}

  .profile {
    display:flex; gap:12px; align-items:center; padding:10px; border-radius:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
    border:1px solid var(--card-border);
  }
  .avatar{width:44px;height:44px;border-radius:8px;background:#081018;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700}
  .profile small{display:block;color:var(--muted);font-size:12px}

  /* Content area */
  .main {
    margin-left:280px;
    padding:40px;
    width:100%;
    max-width:calc(var(--max-width) + 280px);
  }
  .topbar {
    display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:22px;
  }
  .topbar h2{margin:0;font-size:20px}
  .filters{display:flex; gap:10px; align-items:center}
  .chip{
    padding:8px 12px; border-radius:999px; background:transparent; border:1px solid var(--card-border);
    color:var(--muted); font-weight:600; font-size:13px; cursor:pointer;
  }
  .chip.active{ background:linear-gradient(90deg, rgba(0,229,255,0.04), rgba(124,77,255,0.03)); color:var(--accent) }

  /* Posts grid */
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap:20px;
  }
  .card{
    background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
    border:1px solid var(--card-border);
    padding:18px;
    border-radius:12px;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{ transform: translateY(-6px); box-shadow: 0 18px 40px rgba(2,6,23,0.6) }
  .card h3{margin:0 0 8px 0; color:var(--accent)}
  .meta{color:var(--muted); font-size:13px; margin-bottom:12px}
  .tags{display:flex; gap:8px; flex-wrap:wrap}
  .tag{font-size:12px; color:var(--muted); padding:6px 8px; border-radius:8px; background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.02)}

  /* code snippet style */
  pre{background:#071018;padding:12px;border-radius:8px;overflow:auto;border:1px solid rgba(255,255,255,0.02);font-size:13px;color:#bfefff}

  /* Responsive */
  @media (max-width:880px){
    .sidebar{position:fixed; left: -320px; transform: translateX(0); transition: left .22s ease}
    .sidebar.open{left:0}
    .main{margin-left:0;padding:18px}
    .topbar{align-items:flex-start}
    .mobile-toggle{display:inline-flex}
  }

  .mobile-toggle{display:none; gap:10px; align-items:center; background:transparent; border:1px solid var(--card-border); padding:8px 12px; border-radius:10px; color:var(--muted)}
  .mobile-toggle svg{width:18px;height:18px;fill:currentColor}
</style>
<script>
function toggleSub(el) {
  document.querySelectorAll('.subelement').forEach(s => {
    s.style.display = s.style.display === "flex" ? "none" : "flex";
  });
  }
</script>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="brand">
    <div class="logo">S</div>
    <div>
      <h1>Strix’s site</h1>
      <p>Journey notes</p>
    </div>
  </div>

  <div class="search" role="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity:.9"><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <input id="searchInput" placeholder="Search posts tags..." />
  </div>

  <nav class="nav" id="nav">
    <a href="https://0xstrix01.github.io/blog/" class="active" ><span class="dot"></span> Home</a>
    <a href="#" onclick="toggleSub(this)"><span class="dot"></span> Credentials</a>
    <a href="https://0xstrix01.github.io/blog/credentials/windows/index.html class="subelement"><span class="dot"></span> Windows</a>
    <a href="https://0xstrix01.github.io/blog/credentials/linux/" class="subelement"><span class="dot"></span> Linux</a>
    <a href="https://0xstrix01.github.io/blog/"><span class="dot"></span> Writeups</a>
    <a href="https://0xstrix01.github.io/blog/"><span class="dot"></span> About</a>
  </nav>

  <div class="spacer"></div>

  <div class="profile">
    <div class="avatar">S</div>
    <div>
      <div style="font-weight:700">Strix</div>
      <small>Offensive Security • Notes</small>
    </div>
  </div>
</div>

<!-- Main content -->
<div class="main">
  <div class="topbar">
    <div>
      <button class="mobile-toggle" id="toggleBtn" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Menu
      </button>
      <h2>Latest Posts</h2>
    </div>

  </div>

  <div class="grid" id="posts">

	<a href="https://0xstrix01.github.io/blog/credentials/windows/windows_sam.html" style="text-decoration:none;color:#cfe9f2;">
		<article class="card">
      		<h3>Steal SAM database hashes and other local hashes</h3>
      		<p>The SAM database stores several hashes which are retrivable with the correct privileges.</p>
    		</article>
	</a>

  </div>

  <hr style="border:none;border-top:1px solid rgba(255,255,255,0.03);margin:28px 0">

</div>

<script>
  // Sidebar toggle for mobile
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('toggleBtn');
  toggle.addEventListener('click', ()=> sidebar.classList.toggle('open'));
</script>
</body>
</html>
